# Cloud Build pipeline for the portfolio.
#
# Triggered by pushes to `main` on GitHub (trigger "portfolio", us-south1).
# Builds the container, pushes it to Artifact Registry tagged with the commit
# SHA, then rolls it out to Cloud Run.
#
# All configuration comes from Secret Manager — nothing sensitive is committed
# here or baked into the image layers.

substitutions:
  _REGION: us-south1
  _AR_REPO: portfolio
  _SERVICE: portfolio
  _RUNTIME_SA: portfolio-run@$PROJECT_ID.iam.gserviceaccount.com

# Build-time secrets. NEXT_PUBLIC_* values are inlined into the client bundle
# by Next at build time, so they must be present here, not just at runtime.
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SITE_URL/versions/latest
      env: NEXT_PUBLIC_SITE_URL

steps:
  # 1. Resolve the image tag once and share it with later steps via /workspace.
  #    $SHORT_SHA is empty for manually submitted builds, so fall back to the
  #    build id rather than producing a bare ":" tag.
  - id: tag
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        TAG="${SHORT_SHA}"
        if [ -z "$$TAG" ]; then TAG="manual-${BUILD_ID}"; fi
        echo -n "$$TAG" > /workspace/.image_tag
        echo "image tag: $$TAG"

  # 2. Build the image, injecting the build-time secret as a --build-arg.
  - id: build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    secretEnv: [NEXT_PUBLIC_SITE_URL]
    args:
      - -c
      - |
        set -euo pipefail
        TAG="$$(cat /workspace/.image_tag)"
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}"
        docker build \
          --build-arg NEXT_PUBLIC_SITE_URL="$$NEXT_PUBLIC_SITE_URL" \
          -t "$$IMAGE:$$TAG" \
          -t "$$IMAGE:latest" \
          .

  # 3. Push both tags.
  - id: push
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        TAG="$$(cat /workspace/.image_tag)"
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}"
        docker push "$$IMAGE:$$TAG"
        docker push "$$IMAGE:latest"

  # 4. Roll out to Cloud Run. Deployed by immutable tag, never :latest.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        TAG="$$(cat /workspace/.image_tag)"
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}"
        gcloud run deploy "${_SERVICE}" \
          --image="$$IMAGE:$$TAG" \
          --region="${_REGION}" \
          --platform=managed \
          --service-account="${_RUNTIME_SA}" \
          --min-instances=0 \
          --max-instances=10 \
          --cpu=1 \
          --memory=512Mi \
          --concurrency=80 \
          --timeout=60s \
          --port=8080 \
          --allow-unauthenticated \
          --quiet

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  # $SHORT_SHA is unset on manual submissions; don't fail the build over it.
  substitution_option: ALLOW_LOOSE

timeout: 1200s
